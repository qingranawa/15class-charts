<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 淡紫孩子榜</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <span class="auth-logo-icon">🔥</span>
        <span class="auth-logo-text">淡紫孩子榜</span>
      </a>
      <h1 class="auth-title">注册</h1>
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="regUsername">用户名</label>
          <input type="text" id="regUsername" placeholder="2-20 个字符" minlength="2" maxlength="20" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="regPassword">密码</label>
          <input type="password" id="regPassword" placeholder="至少 6 个字符" minlength="6" autocomplete="new-password" required>
        </div>
        <div class="auth-error" id="authError" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-lg btn-full">注册</button>
      </form>
      <p class="auth-switch">已有账号？<a href="/login.html">去登录</a></p>
      <p class="auth-back"><a href="/">&larr; 返回首页</a></p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/public/js/api.js"></script>
  <script src="/public/js/auth.js"></script>
  <script>
    Auth.init();
    if (Auth.isLoggedIn()) location.href = '/';

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3000);
    }

    const form = document.getElementById('registerForm');
    const errorEl = document.getElementById('authError');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      errorEl.style.display = 'none';
      try {
        await API.register(username, password);
        location.href = '/login.html?registered=1';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
